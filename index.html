<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Distribution</title>
    <style>
        canvas {
            border: 2px black;
            border-radius: 15px; /* Rounded corners */
            margin-top: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            background-color: #61dafb;
            color: #282c34;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .canvas-text {
            position: absolute;
            top: 50%;
            left: 50%;
            font-size: 24px;
            font-family: 'Arial', sans-serif;
            color: #b7b7b7;
            text-align: center;
        }

        .canvas-container {
            position: relative;
            display: inline-block;
        }

        #threeCanvas {
            width: 600px; /* Fixed width for Three.js canvas */
            height: 400px; /* Fixed height for Three.js canvas */
            margin-left: 20px; /* Space between canvases */
        }


    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three/build/three.module.js",
                "OrbitControls": "https://unpkg.com/three@0.138.0/examples/jsm/controls/OrbitControls.js"
            }
        }
    </script>
</head>
<body>
    <h1>Cup Distribution on Customized pad</h1>
    <label for="diameter">Upload background photo:</label>
    <input type="file" id="backgroundImage" accept="image/jpeg, image/png">
    <!--<input type="file" id="modelUpload" accept=".obj, .glb, .fbx" />-->
    <label for="diameter">Enter Circle Diameter:</label>
    <input type="number" id="diameter" min="1" required>
    <button id="calculateBtn">Calculate Distribution</button>
    <button id="clearDrawingsBtn">Clear Drawings</button>
    <button id="clearBtn">Clear Canvas</button>
    <button id="generate3DModelBtn">Genrate models</button>
    <br></br>
    <div class="canvas-container">
        <canvas id="myCanvas" width="600" height="400"></canvas>
        <div class="canvas-text" id="canvas-text">skin image</div>
    </div>
    <!-- <canvas id="threeCanvas"></canvas> -->
    <script type="module" src="script.js"></script>

    
</body>
</html>
